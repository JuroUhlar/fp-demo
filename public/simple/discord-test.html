<!doctype html>
<html>
  <head>
    <title>JavaScript Sandbox</title>
    <meta charset="UTF-8" />
  </head>

  <body>
    <div id="app">Discord JS agent API key test</div>
    <script>
      // Initialize the agent at application startup.
      // Some ad blockers or browsers will block Fingerprint CDN URL.
      // To fix this, use a custom subdomain or a proxy integration.
      // (see info box below)
      const fpPromise = import('https://fpjscdn.net/v3/OjRnWMy62IUKhpuP9rlt').then((FingerprintJS) =>
        FingerprintJS.load({ region: 'ap' }),
      );

      // Get the visitor identifier when you need it.
      fpPromise.then((fp) => fp.get()).then((result) => console.log(result.visitorId, result.requestId));
    </script>
  </body>
</html>
